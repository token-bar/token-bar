name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    # TokenBar targets macOS 26; tests must run on a host at or above the deployment target.
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          xcodebuild \
            -project TokenBar.xcodeproj \
            -scheme TokenBar \
            -destination 'platform=macOS' \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=- \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES

      - name: Test
        run: |
          xcodebuild \
            -project TokenBar.xcodeproj \
            -scheme TokenBar \
            -destination 'platform=macOS' \
            -configuration Debug \
            test \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=- \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES
