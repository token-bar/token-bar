<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TokenBar — AI usage tracker for macOS</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />

    <!-- Primary SEO & link previews (fallback when OG/Twitter are not used) -->
    <meta
      name="description"
      content="TokenBar is a macOS menu bar app that tracks AI usage across multiple providers in one place."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://token-bar.pages.dev/" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, Discord, iMessage, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TokenBar" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://token-bar.pages.dev/" />
    <meta property="og:title" content="TokenBar — AI usage tracker for macOS" />
    <meta
      property="og:description"
      content="TokenBar is a macOS menu bar app that tracks AI usage across multiple providers in one place."
    />
    <meta
      property="og:image"
      content="https://token-bar.pages.dev/og.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="2634" />
    <meta property="og:image:height" content="1116" />
    <meta
      property="og:image:alt"
      content="TokenBar — AI usage tracker for macOS"
    />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TokenBar" />
    <meta
      name="twitter:description"
      content="TokenBar is a macOS menu bar app that tracks AI usage across multiple providers in one place."
    />
    <meta
      name="twitter:image"
      content="https://token-bar.pages.dev/og.png"
    />
    <meta
      name="twitter:image:alt"
      content="TokenBar — AI usage tracker for macOS"
    />

    <!-- PWA / browser UI hints -->
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="application-name" content="TokenBar" />
    <meta name="apple-mobile-web-app-title" content="TokenBar" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
